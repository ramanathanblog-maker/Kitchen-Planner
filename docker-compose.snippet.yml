# Block for PK to merge into ~/homelab/docker-compose.yml.
# Port 3010 is reserved for this app — 3000 and 5433 are taken by NeoTrack dev on the same host.
# Do NOT paste this file's own top-level `services:` key if the shared compose file
# already has one — merge just the `kitchen-planner:` block underneath it.
#
# Before `docker compose build`, export the deploy/build stamp so GET /health
# can report it (Audit 2026-07-18, threat: stale-process masking; see
# OPERATIONS.md "Deploy / build stamp"):
#   export GIT_COMMIT=$(git -C ~/homelab/kitchenplanner rev-parse --short HEAD)
#   export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
#   docker compose build kitchen-planner && docker compose up -d kitchen-planner
# Omitting these is safe (both default to "unknown" in the Dockerfile) — the
# build won't fail, /health just won't be able to prove which commit is running.
  kitchen-planner:
    build:
      context: ./kitchenplanner
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: kitchen-planner
    restart: unless-stopped
    ports:
      - "${KITCHEN_PORT:-3010}:3010"
    volumes:
      - ./kitchenplanner/data:/app/data
    environment:
      - NODE_ENV=production
      # Phase 6a: server.js now opens one DB per household (data/rp.db,
      # data/ps.db) plus data/system.db, all resolved under the volume mount
      # above via src/db/households.js — no KITCHEN_DB override needed
      # (that single-path env var applied to the old one-DB-per-app shape).
    # Healthcheck also lives in the image's own Dockerfile HEALTHCHECK (hits
    # GET /health, the real DB-connectivity check, not the Phase 0 stub); listed
    # here too only so `docker compose ps` shows it without needing `docker inspect`.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
